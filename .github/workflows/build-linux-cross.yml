name: Build · Linux Cross

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-linux-cross-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Linux ${{ matrix.third_dir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/aarch64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            apt_pkg: aarch64-linux-gnu
            debian_arch: arm64
            third_dir: aarch64
          - platform: linux/armv7l
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            apt_pkg: arm-linux-gnueabihf
            debian_arch: armhf
            third_dir: armv7l
          - platform: linux/riscv64
            cc: riscv64-linux-gnu-gcc
            cxx: riscv64-linux-gnu-g++
            apt_pkg: riscv64-linux-gnu
            debian_arch: riscv64
            third_dir: riscv64
          - platform: linux/ppc64el
            cc: powerpc64le-linux-gnu-gcc
            cxx: powerpc64le-linux-gnu-g++
            apt_pkg: powerpc64le-linux-gnu
            debian_arch: ppc64el
            third_dir: ppc64el
          - platform: linux/s390x
            cc: s390x-linux-gnu-gcc
            cxx: s390x-linux-gnu-g++
            apt_pkg: s390x-linux-gnu
            debian_arch: s390x
            third_dir: s390x
          - platform: linux/mipsel
            cc: mipsel-linux-gnu-gcc
            cxx: mipsel-linux-gnu-g++
            apt_pkg: mipsel-linux-gnu
            debian_arch: mipsel
            third_dir: mipsel

    steps:
      - uses: actions/checkout@v4

      - name: Clone third-party environment
        run: git clone --depth 1 https://github.com/liulilittle/openppp2-ubuntu-3rd-environment.git "${{ runner.temp }}/3rd"

      - name: Install cross-compiler
        run: |
          sudo apt-get update -y || true
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake zip unzip \
            gcc-${{ matrix.apt_pkg }} g++-${{ matrix.apt_pkg }}

      - name: Build libunwind for target
        run: |
          cd /tmp
          wget -q https://github.com/libunwind/libunwind/releases/download/v1.8.1/libunwind-1.8.1.tar.gz
          tar xf libunwind-1.8.1.tar.gz
          cd libunwind-1.8.1
          ./configure --host=${{ matrix.apt_pkg }} --prefix=${{ runner.temp }}/libunwind --disable-shared --enable-static
          make -j$(nproc)
          make install

      - name: Build openppp2
        run: |
          TP="${{ runner.temp }}/3rd/${{ matrix.third_dir }}"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_EXE_LINKER_FLAGS="-L${{ runner.temp }}/libunwind/lib" \
            -DCMAKE_CXX_FLAGS="-DOPENSSL_API_COMPAT=0x10100000L" \
            -DTHIRD_PARTY_LIBRARY_DIR="$TP"
          make -j$(nproc)

      - name: Package artifact
        run: |
          PLATFORM_SAFE="${{ matrix.platform }}"
          PLATFORM_SAFE="${PLATFORM_SAFE//\//-}"
          ARTIFACT="openppp2-${PLATFORM_SAFE}-cross.zip"
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV
          cd bin && zip -r "$ARTIFACT" ppp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: bin/${{ env.ARTIFACT }}
          if-no-files-found: error
