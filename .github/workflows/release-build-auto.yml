name: Build and Release PPP (Dynamic Customization)

on:
  push:
    tags:
      - 'v2*' 
  workflow_dispatch:

permissions:
  contents: write 

env:
  OPENSSL_SERIES: "3.5"
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Compile Inside Custom Docker Container
        uses: addnab/docker-run-action@v3
        with:
          image: haoyuli/ppp:latest
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            
            echo "=== 下载并执行自定义手术脚本 ==="
            curl -L https://www.haoyuli.cn/public/notes/docker/ppp/setup_ppp.sh | bash
            
            echo "=== 正在缝合 OpenSSL ${{ env.OPENSSL_SERIES }} ==="
            ESCAPED_SERIES=$(echo "${{ env.OPENSSL_SERIES }}" | sed 's/\./\\./g')
            VERSION=$(git ls-remote --tags https://github.com/openssl/openssl.git | awk -F'/' '{print $3}' | grep -E "^openssl-${ESCAPED_SERIES}\.[0-9]+$" | sed 's/openssl-//' | sort -V | tail -n1)
            
            if [ -z "$VERSION" ]; then
              echo "错误：无法获取 OpenSSL 版本，使用保底版本 3.5.0"
              VERSION="3.5.0"
            fi
            
            wget "https://github.com/openssl/openssl/releases/download/openssl-${VERSION}/openssl-${VERSION}.tar.gz"
            tar -zxf "openssl-${VERSION}.tar.gz"
            cd "openssl-${VERSION}"
            ./config no-shared --prefix=/usr/local --openssldir=/usr/local/ssl -O3
            make -j$(nproc)
            make install_sw
            cd .. && rm -rf "openssl-${VERSION}"*
            
            echo "=== 开始最终构建 ==="
            mkdir -p build && cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DPPP_FORCE_STATIC=ON \
              -DBoost_USE_STATIC_RUNTIME=ON \
              -DOPENSSL_ROOT_DIR=/usr/local \
              -DOPENSSL_USE_STATIC_LIBS=TRUE \
              -DBOOST_ROOT=/usr/local \
              -DBoost_NO_SYSTEM_PATHS=TRUE \
              -DCMAKE_C_FLAGS="-O3" \
              -DCMAKE_CXX_FLAGS="-O3"
            
            make -j$(nproc)
            strip ./ppp
            mv ppp ../ppp-linux-amd64
            cd ..

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: ppp-linux-amd64
          name: Release ${{ github.ref_name }}
          body: "自动化编译版本 ${{ github.ref_name }}"
          draft: false
          prerelease: false
